name: Build eCaptureBurp JAR

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.java'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradlew'
      - 'gradle/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (clean + jar)
        run: ./gradlew clean jar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: eCaptureBurp-JAR
          path: build/libs/*.jar
          retention-days: 30

      - name: Show built JAR files
        run: ls -lh build/libs/
